name: Build, publish and deploy to MonsterASP.NET
on: [push]
jobs:
  build_and_deploy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Assemble publish folder
        run: |
          mkdir publish
          Copy-Item -Recurse .next/standalone/* publish/
          mkdir publish/.next/static
          Copy-Item -Recurse .next/static/* publish/.next/static/
          if (Test-Path public) { Copy-Item -Recurse public publish/public }
          Copy-Item web.config publish/web.config
        shell: pwsh

      - name: Deploy to MonsterASP.NET via WebDeploy
        uses: rasmusbuchholdt/simply-web-deploy@2.1.0
        with:
          website-name: ${{ secrets.WEBSITE_NAME }}
          server-computer-name: ${{ secrets.SERVER_COMPUTER_NAME }}
          server-username: ${{ secrets.SERVER_USERNAME }}
          server-password: ${{ secrets.SERVER_PASSWORD }}
          source-path: './publish'
